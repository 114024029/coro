/* 主容器 */
.container{
    width:900px;
    margin:40px auto;
    background:#fffaf5;
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    animation:fadeIn 1s ease;
}

/* 標題區 */
.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
}

.title{
    font-size:32px;
    font-weight:bold;
}

.name-box{
    background:#d6c4c4;
    padding:10px 30px;
    border-radius:30px;
    font-size:24px;
}

/* 照片 */
.profile{
    text-align:center;
    margin:20px 0;
}

.profile img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid #d6cfae;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.4s;
}

.profile img:hover{
    transform:scale(1.1) rotate(3deg);
}

/* 卡片 */
.section{
    margin-top:20px;
    padding:20px;
    background:#f7f3ea;
    border-radius:12px;
    transition:0.3s;
    animation:slideUp 0.8s ease;
}

.section:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

h2{
    border-left:6px solid #9a8f6a;
    padding-left:10px;
    color:#7c7356;
}

/* 星星技能 */
.star{
    color:#f5c542;
    font-size:18px;
    letter-spacing:3px;
}

/* 清單 */
ul{
    padding-left:20px;
}

/* 動畫 */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* RWD */
@media(max-width:768px){
    .container{
        width:90%;
    }
}

</style>
